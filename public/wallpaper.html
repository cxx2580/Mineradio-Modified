<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mineradio Wallpaper</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#030406}
    body{user-select:none}
    canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  </style>
</head>
<body>
  <canvas id="wall"></canvas>
  <script>
    'use strict';
    var canvas = document.getElementById('wall');
    var ctx = canvas.getContext('2d', { alpha:false });
    var W = 1, H = 1, dpr = 1;
    var state = {
      enabled:false,title:'Mineradio',artist:'',cover:'',playing:false,preset:5,opacity:1,
      colors:{primary:'#d6f8ff',secondary:'#9cffdf',highlight:'#fff0b8',glow:'#9cffdf'},
      lyric:{text:'Mineradio',progress:0,y:.76,fontFamily:'Microsoft YaHei, Segoe UI, sans-serif',fontWeight:900,lineHeight:1.08,scale:1,glowParticles:false},
      motion:{lyricGlowStrength:.35,highBloom:0,beatGlow:0,beatPulse:0,bass:0}
    };
    var targetState = state;
    var coverImg = null, coverSrc = '';
    var particles = [];
    var sparks = [];
    function clamp(v,min,max){ v = Number(v); return isFinite(v) ? Math.max(min, Math.min(max, v)) : min; }
    function mix(a,b,t){ return a + (b - a) * t; }
    function hexToRgb(hex, fallback){
      hex = String(hex || fallback || '#9cffdf').trim();
      if (/^#[0-9a-f]{3}$/i.test(hex)) hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
      if (!/^#[0-9a-f]{6}$/i.test(hex)) hex = fallback || '#9cffdf';
      return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
    }
    function rgba(hex, a){
      var c = hexToRgb(hex);
      return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + a + ')';
    }
    function rand(seed){ return Math.abs(Math.sin(seed * 3187.917) * 43758.5453) % 1; }
    function ensureParticles(){
      var target = Math.min(1500, Math.max(760, Math.round((innerWidth * innerHeight) / 2500)));
      while (particles.length < target) {
        var i = particles.length + 1;
        particles.push({ seed:i * 11.37, x:rand(i), y:rand(i * 2.7), lane:rand(i * 5.9), z:rand(i * 8.1), phase:rand(i * 9.41) * Math.PI * 2, size:.6 + rand(i * 4.2) * 2.8 });
      }
      if (particles.length > target + 120) particles.length = target;
    }
    function resize(){
      dpr = Math.min(1.35, Math.max(1, window.devicePixelRatio || 1));
      W = Math.max(1, Math.floor(innerWidth * dpr));
      H = Math.max(1, Math.floor(innerHeight * dpr));
      canvas.width = W; canvas.height = H;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ensureParticles();
    }
    function setCover(src){
      src = String(src || '');
      if (src === coverSrc) return;
      coverSrc = src;
      coverImg = null;
      if (!src) return;
      var img = new Image();
      img.onload = function(){ if (coverSrc === src) coverImg = img; };
      img.onerror = function(){ if (coverSrc === src) coverImg = null; };
      img.src = src;
    }
    function applyState(next){
      next = next || {};
      targetState = Object.assign({}, targetState, next);
      targetState.colors = Object.assign({}, targetState.colors, next.colors || {});
      targetState.lyric = Object.assign({}, targetState.lyric, next.lyric || {});
      targetState.motion = Object.assign({}, targetState.motion, next.motion || {});
      setCover(targetState.cover || '');
    }
    function smoothState(){
      state.enabled = targetState.enabled;
      state.title = targetState.title || state.title;
      state.artist = targetState.artist || '';
      state.cover = targetState.cover || '';
      state.playing = !!targetState.playing;
      state.preset = Number(targetState.preset) || 0;
      state.opacity = mix(state.opacity || 1, clamp(targetState.opacity == null ? 1 : targetState.opacity, .35, 1), .12);
      state.colors = Object.assign({}, state.colors, targetState.colors || {});
      state.lyric = Object.assign({}, state.lyric, targetState.lyric || {});
      var nextMotion = targetState.motion || {};
      state.motion = {
        lyricGlowStrength:mix(Number(state.motion.lyricGlowStrength)||0, Number(nextMotion.lyricGlowStrength)||0, .18),
        highBloom:mix(Number(state.motion.highBloom)||0, Number(nextMotion.highBloom)||0, .18),
        beatGlow:mix(Number(state.motion.beatGlow)||0, Number(nextMotion.beatGlow)||0, .24),
        beatPulse:mix(Number(state.motion.beatPulse)||0, Number(nextMotion.beatPulse)||0, .26),
        bass:mix(Number(state.motion.bass)||0, Number(nextMotion.bass)||0, .22)
      };
    }
    function drawCover(now){
      if (!coverImg) return;
      var beat = state.motion.beatPulse || 0;
      var side = Math.min(innerWidth, innerHeight) * (.46 + beat * .025 + Math.sin(now * .21) * .012);
      var x = innerWidth * .5 - side * .5;
      var y = innerHeight * .48 - side * .5 + Math.sin(now * .37) * 9;
      ctx.save();
      ctx.globalAlpha = (.18 + beat * .05) * (state.opacity || 1);
      ctx.filter = 'blur(34px) saturate(1.35)';
      ctx.drawImage(coverImg, x - side * .18, y - side * .18, side * 1.36, side * 1.36);
      ctx.filter = 'blur(4px) saturate(1.10)';
      ctx.globalAlpha = .11 * (state.opacity || 1);
      ctx.drawImage(coverImg, x, y, side, side);
      ctx.restore();
    }
    function wrapLine(text, maxWidth){
      text = String(text || '').trim();
      if (!text) return ['Mineradio'];
      var hasSpaces = /\s/.test(text);
      var units = hasSpaces ? text.split(/\s+/) : text.split('');
      var lines = [];
      var line = '';
      for (var i=0;i<units.length;i++) {
        var next = hasSpaces ? (line ? line + ' ' + units[i] : units[i]) : line + units[i];
        if (ctx.measureText(next).width <= maxWidth || !line) line = next;
        else {
          lines.push(line);
          line = units[i];
        }
      }
      if (line) lines.push(line);
      return lines;
    }
    function lyricLines(maxWidth){
      var text = String(state.lyric && state.lyric.text || state.title || 'Mineradio').replace(/\r/g, '').trim();
      var raw = text.split(/\n+/).map(function(v){ return v.trim(); }).filter(Boolean);
      if (!raw.length) raw = [state.title || 'Mineradio'];
      var lines = [];
      raw.forEach(function(line){ lines = lines.concat(wrapLine(line, maxWidth)); });
      if (lines.length > 3) {
        var start = Math.max(0, Math.floor((lines.length - 3) / 2));
        lines = lines.slice(start, start + 3);
      }
      return lines;
    }
    function drawLyricSparks(now, cx, topY, lines, lineHeight, fontSize, opacity){
      if (sparks.length < 120) {
        for (var i=sparks.length;i<120;i++) sparks.push({ seed:i * 17.31, life:rand(i * 3.2), lane:rand(i * 4.4) });
      }
      var glow = state.colors.glow || '#9cffdf';
      var highlight = state.colors.highlight || '#fff0b8';
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (var s=0;s<sparks.length;s++) {
        var p = sparks[s];
        var t = (p.life + now * (.045 + p.lane * .04)) % 1;
        var row = Math.floor(p.lane * lines.length) % Math.max(1, lines.length);
        var spread = Math.min(innerWidth * .34, 420 + fontSize * 4);
        var x = cx + (rand(p.seed) - .5) * spread + Math.sin(now * .7 + p.seed) * 20;
        var y = topY + row * lineHeight + (t - .5) * lineHeight * 1.6;
        var a = Math.sin(t * Math.PI);
        ctx.globalAlpha = a * (.11 + (state.motion.beatPulse || 0) * .12) * opacity;
        ctx.fillStyle = p.lane > .55 ? highlight : glow;
        ctx.beginPath();
        ctx.arc(x, y, 1.1 + a * 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    function drawLyric(now, opacity){
      var lyric = state.lyric || {};
      var scale = clamp(lyric.scale == null ? 1 : lyric.scale, .35, 1.65);
      var fontSize = clamp(Math.min(innerWidth, innerHeight) * .058 * scale, 28, 78);
      var lineHeight = fontSize * clamp(lyric.lineHeight || 1.08, .86, 1.35);
      var fontFamily = lyric.fontFamily || 'Microsoft YaHei, Segoe UI, sans-serif';
      var fontWeight = Math.round(clamp(lyric.fontWeight || 900, 500, 900));
      ctx.save();
      ctx.font = fontWeight + ' ' + Math.round(fontSize) + 'px ' + fontFamily;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      var maxWidth = Math.min(innerWidth * .78, 1080);
      var lines = lyricLines(maxWidth);
      if (lines.length > 1) {
        fontSize *= lines.length === 2 ? .88 : .76;
        lineHeight = fontSize * clamp(lyric.lineHeight || 1.08, .86, 1.35);
        ctx.font = fontWeight + ' ' + Math.round(fontSize) + 'px ' + fontFamily;
      }
      var cx = innerWidth * .5;
      var baseY = innerHeight * clamp(lyric.y == null ? .76 : lyric.y, .16, .88);
      var topY = baseY - (lines.length - 1) * lineHeight * .5;
      var primary = state.colors.primary || '#d6f8ff';
      var highlight = state.colors.highlight || '#fff0b8';
      var glow = state.colors.glow || '#9cffdf';
      var beat = state.motion.beatPulse || 0;
      var glowStrength = clamp((state.motion.lyricGlowStrength || 0) + (state.motion.beatGlow || 0) * .28, 0, 1.35);
      ctx.shadowColor = rgba(glow, (.38 + beat * .22) * opacity);
      ctx.shadowBlur = 24 + glowStrength * 54 + beat * 28;
      for (var i=0;i<lines.length;i++) {
        var y = topY + i * lineHeight;
        ctx.globalAlpha = (.42 + i * .08) * opacity;
        ctx.fillStyle = rgba(primary, .72);
        ctx.fillText(lines[i], cx, y);
      }
      var progress = clamp(lyric.progress || 0, 0, 1);
      for (var j=0;j<lines.length;j++) {
        var line = lines[j];
        var y2 = topY + j * lineHeight;
        var width = ctx.measureText(line).width;
        ctx.save();
        ctx.beginPath();
        ctx.rect(cx - width * .5 - 10, y2 - lineHeight * .52, (width + 20) * progress, lineHeight * 1.04);
        ctx.clip();
        ctx.globalAlpha = (.88 + beat * .10) * opacity;
        ctx.fillStyle = rgba(highlight, .96);
        ctx.fillText(line, cx, y2);
        ctx.restore();
      }
      if (lyric.glowParticles) drawLyricSparks(now, cx, topY, lines, lineHeight, fontSize, opacity);
      ctx.restore();
    }
    function drawMeta(opacity){
      var title = String(state.title || '').trim();
      var artist = String(state.artist || '').trim();
      if (!title && !artist) return;
      ctx.save();
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.shadowBlur = 18;
      ctx.shadowColor = 'rgba(0,0,0,.48)';
      ctx.fillStyle = 'rgba(255,255,255,' + (.42 * opacity).toFixed(3) + ')';
      ctx.font = '700 14px Microsoft YaHei, Segoe UI, sans-serif';
      ctx.fillText(title, 34, innerHeight - 48);
      if (artist) {
        ctx.fillStyle = 'rgba(255,255,255,' + (.28 * opacity).toFixed(3) + ')';
        ctx.font = '600 12px Microsoft YaHei, Segoe UI, sans-serif';
        ctx.fillText(artist, 34, innerHeight - 28);
      }
      ctx.restore();
    }
    function draw(nowMs){
      var now = nowMs * .001;
      smoothState();
      ensureParticles();
      var opacity = clamp(state.opacity || 1, .35, 1);
      var primary = state.colors.primary || '#d6f8ff';
      var secondary = state.colors.secondary || '#9cffdf';
      var highlight = state.colors.highlight || '#fff0b8';
      var glow = state.colors.glow || secondary;
      var beat = state.motion.beatPulse || 0;
      var bass = state.motion.bass || 0;
      var bloom = state.motion.highBloom || 0;
      var bg = ctx.createLinearGradient(0,0,innerWidth,innerHeight);
      bg.addColorStop(0, '#020305');
      bg.addColorStop(.38, rgba(primary, .075 * opacity));
      bg.addColorStop(.70, '#05070b');
      bg.addColorStop(1, rgba(secondary, .10 * opacity));
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,innerWidth,innerHeight);
      var bgCx = innerWidth * (.50 + Math.sin(now * .13) * .035);
      var bgCy = innerHeight * (.48 + Math.cos(now * .11) * .025);
      var bgAura = ctx.createRadialGradient(bgCx,bgCy,0,bgCx,bgCy,Math.max(innerWidth,innerHeight)*.64);
      bgAura.addColorStop(0, rgba(highlight, (.12 + beat * .08) * opacity));
      bgAura.addColorStop(.34, rgba(primary, .08 * opacity));
      bgAura.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bgAura;
      ctx.fillRect(0,0,innerWidth,innerHeight);
      drawCover(now);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      var cx = innerWidth * .5;
      var cy = innerHeight * .48 + Math.sin(now * .28) * innerHeight * .018;
      var rx = innerWidth * (.24 + bass * .04);
      var ry = innerHeight * (.18 + beat * .025);
      var preset = Math.round(Number(state.preset) || 0);
      for (var i=0;i<particles.length;i++) {
        var p = particles[i];
        var speed = .08 + rand(p.seed) * .18 + (state.playing ? .10 : .02);
        var a = (p.phase + now * speed + Math.sin(now * .07 + p.seed) * .16) % (Math.PI * 2);
        var depth = .16 + p.z * .84;
        var ring = .24 + depth * .92;
        var x, y;
        if (preset === 1) {
          var tunnel = (p.z + now * (state.playing ? .055 : .016)) % 1;
          var scale = .12 + tunnel * tunnel * 1.08;
          x = cx + Math.cos(a) * innerWidth * .40 * scale;
          y = cy + Math.sin(a) * innerHeight * .30 * scale;
          depth = tunnel;
        } else if (preset === 4) {
          var vinyl = .58 + Math.sin(p.seed + now * .18) * .08 + p.z * .34;
          x = cx + Math.cos(a) * rx * 1.85 * vinyl;
          y = cy + Math.sin(a) * ry * 1.18 * vinyl;
        } else if (preset === 6) {
          var skull = Math.sin(a * 2.0) * .18;
          x = cx + Math.cos(a) * rx * 1.55 * (.70 + skull);
          y = cy + Math.sin(a) * ry * 1.55 * (1.0 - skull) - innerHeight * .035;
        } else {
          var wobble = Math.sin(now * (.22 + rand(p.seed) * .18) + p.seed) * 26 * depth;
          x = cx + Math.cos(a) * rx * ring + Math.sin(now * .11 + p.seed) * 42 * depth;
          y = cy + Math.sin(a * (1.0 + rand(p.seed * 2) * .16)) * ry * ring + wobble;
        }
        var tw = Math.pow(.5 + .5 * Math.sin(now * (.58 + rand(p.seed)*.44) + p.seed), 3.5);
        var r = Math.max(.7, p.size * (.76 + depth * 1.5 + tw * .95 + beat * .9));
        var col = tw > .74 ? highlight : (p.lane > .62 ? primary : (p.lane > .32 ? secondary : glow));
        ctx.globalAlpha = (0.035 + tw * .15 + beat * .04 + bloom * .025) * opacity * (.55 + depth * .55);
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fill();
      }
      var aura = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(innerWidth,innerHeight)*.54);
      aura.addColorStop(0, rgba(highlight, (.12 + beat * .06) * opacity));
      aura.addColorStop(.34, rgba(secondary, .08 * opacity));
      aura.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = .9;
      ctx.fillStyle = aura;
      ctx.fillRect(0,0,innerWidth,innerHeight);
      ctx.restore();
      drawLyric(now, opacity);
      drawMeta(opacity);
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    resize();
    if (window.desktopOverlay && window.desktopOverlay.onWallpaperState) {
      window.desktopOverlay.onWallpaperState(applyState);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
